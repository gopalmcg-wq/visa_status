name: CEAC Visa Status Check

on:
  schedule:
    - cron: "*/15 2-11 * * 1-5"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: pip install selenium requests 2captcha-python

      - name: Restore last status
        uses: actions/cache@v4
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
          restore-keys: ceac-status-

      - name: Run status check
        env:
          CEAC_CASE_NUMBER: ${{ secrets.CEAC_CASE_NUMBER }}
          CEAC_VISA_TYPE: "NIV"
          CEAC_LOCATION: "CHENNAI"
          CEAC_PASSPORT: ${{ secrets.CEAC_PASSPORT }}
          CEAC_SURNAME: ${{ secrets.CEAC_SURNAME }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CHROME_BIN: /usr/bin/google-chrome
          CHROMEDRIVER_BIN: /usr/bin/chromedriver
        run: python check_status.py

      - name: Save status for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
