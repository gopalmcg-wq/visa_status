name: CEAC Visa Status Check

on:
  schedule:
    - cron: "*/15 2-11 * * 1-5"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -fy install
          google-chrome --version
          which google-chrome

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}.0/linux64/chromedriver-linux64.zip"
          wget -q "$DRIVER_URL" -O chromedriver.zip || true
          if [ ! -f chromedriver.zip ] || [ ! -s chromedriver.zip ]; then
            pip install chromedriver-autoinstaller
            python -c "import chromedriver_autoinstaller; chromedriver_autoinstaller.install()"
          else
            unzip -o chromedriver.zip
            sudo mv chromedriver-linux64/chromedriver /usr/bin/chromedriver
            sudo chmod +x /usr/bin/chromedriver
          fi
          chromedriver --version

      - name: Install Python dependencies
        run: pip install selenium requests 2captcha-python chromedriver-autoinstaller

      - name: Restore last status
        uses: actions/cache@v4
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
          restore-keys: ceac-status-

      - name: Run status check
        env:
          CEAC_CASE_NUMBER: ${{ secrets.CEAC_CASE_NUMBER }}
          CEAC_VISA_TYPE: "NIV"
          CEAC_LOCATION: "CHENNAI"
          CEAC_PASSPORT: ${{ secrets.CEAC_PASSPORT }}
          CEAC_SURNAME: ${{ secrets.CEAC_SURNAME }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_status.py

      - name: Save status for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
