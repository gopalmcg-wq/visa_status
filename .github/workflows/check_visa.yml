name: CEAC Visa Status Check

on:
  schedule:
    # Every 15 min, Mon-Fri, 2:00–11:30 UTC (7:30 AM – 5:00 PM IST)
    - cron: "*/15 2-11 * * 1-5"
  workflow_dispatch:          # Manual trigger button

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser chromium-chromedriver
          pip install selenium requests 2captcha-python

      - name: Restore last status
        uses: actions/cache@v4
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
          restore-keys: ceac-status-

      - name: Run status check
        env:
          CEAC_CASE_NUMBER: ${{ secrets.CEAC_CASE_NUMBER }}
          CEAC_VISA_TYPE: "NIV"
          CEAC_LOCATION: "CHENNAI"
          CEAC_PASSPORT: ${{ secrets.CEAC_PASSPORT }}
          CEAC_SURNAME: ${{ secrets.CEAC_SURNAME }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_status.py

      - name: Save status for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_status.txt
          key: ceac-status-${{ github.run_id }}
